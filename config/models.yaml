default_provider: openai

providers:
  openai:
    api_key: ${OPENAI_API_KEY}
    text_model: gpt-4o
    multimodal_model: gpt-4o
    base_url: ${OPENAI_API_BASE_URL}

  qwen:
    base_url: ${QWEN_API_BASE_URL}
    api_key: ${QWEN_API_KEY}
    text_model: qwen-turbo
    multimodal_model: qwen-vl-plus
